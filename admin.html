<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2E7FB8">
<title>Washly Admin</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0C2A3A; --ink-2:#54707E; --ink-3:#8AA1AC;
  --brand:#2E7FB8; --brand-d:#1F5E8C; --aqua:#3FB6C9;
  --bg:#F4F7F9; --surface:#FFFFFF; --line:#E5ECF0; --line-2:#EEF3F6;
  --green:#1D9E75; --red:#D6463F;
  --shadow:0 1px 2px rgba(12,42,58,.04), 0 1px 3px rgba(12,42,58,.06);
  --shadow-lift:0 4px 16px rgba(12,42,58,.08);
  --display:'Sora',system-ui,sans-serif; --body:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:var(--body);}
body{background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
button{font-family:var(--body);}

.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;background:radial-gradient(900px 500px at 50% -10%, #E3EFF6 0%, transparent 60%), linear-gradient(180deg,#EEF4F8 0%, #F4F7F9 100%);}
.login-box{background:var(--surface);border-radius:18px;border:1px solid var(--line);padding:2.5rem 2.25rem 2rem;width:100%;max-width:374px;box-shadow:var(--shadow-lift);}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:1.75rem;justify-content:center;}
.login-logo img{height:38px;}
.login-logo-text{font-family:var(--display);font-size:22px;font-weight:700;color:var(--brand);}
.admin-badge{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;background:var(--ink);color:#fff;padding:3px 9px;border-radius:999px;vertical-align:middle;}
.login-label{font-size:12px;font-weight:500;color:var(--ink-2);margin-bottom:5px;display:block;}
.login-input{width:100%;padding:11px 13px;font-size:14px;border:1px solid var(--line);border-radius:10px;margin-bottom:0.85rem;background:#FBFCFD;color:var(--ink);transition:.15s;}
.login-input::placeholder{color:var(--ink-3);}
.login-input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(46,127,184,.14);background:#fff;}
.login-btn{width:100%;padding:12px;font-size:14px;font-weight:600;font-family:var(--display);background:var(--brand);color:#fff;border:none;border-radius:10px;cursor:pointer;margin-top:.4rem;transition:background .15s, transform .05s;}
.login-btn:hover{background:var(--brand-d);}
.login-btn:active{transform:translateY(1px);}
.login-btn:disabled{background:#B6C6CE;cursor:default;}
.login-error{font-size:13px;color:#9B2B2B;background:#FBECEC;border:1px solid #F4D4D4;padding:9px 12px;border-radius:10px;margin-top:.85rem;display:none;}
.login-error.show{display:block;}

.app-screen{display:none;}
.app-screen.show{display:block;}
.header{display:flex;justify-content:space-between;align-items:center;padding:.95rem 1.6rem;background:rgba(255,255,255,.92);backdrop-filter:saturate(1.1) blur(6px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30;}
.header-left{display:flex;align-items:center;gap:10px;}
.header-left img{height:28px;}
.brand{font-family:var(--display);font-size:18px;font-weight:700;color:var(--ink);}
.logout-btn{padding:6px 13px;font-size:12px;font-weight:500;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink-2);cursor:pointer;transition:.15s;}
.logout-btn:hover{background:#FBECEC;color:#9B2B2B;border-color:#F0CFCF;}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:1.4rem 1.6rem 0.4rem;}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:1.05rem 1.2rem;box-shadow:var(--shadow);}
.stat-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);margin-bottom:7px;}
.stat-value{font-family:var(--display);font-size:27px;font-weight:700;color:var(--brand);line-height:1;}

.content{padding:1.4rem 1.6rem 2rem;}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.1rem;}
.section-title{font-family:var(--display);font-size:17px;font-weight:700;color:var(--ink);}
.add-btn{display:flex;align-items:center;gap:6px;padding:9px 16px;font-size:13px;font-weight:600;font-family:var(--display);background:var(--brand);color:#fff;border:none;border-radius:10px;cursor:pointer;transition:background .15s, transform .05s;}
.add-btn:hover{background:var(--brand-d);}
.add-btn:active{transform:translateY(1px);}

.laundry-list{display:flex;flex-direction:column;gap:10px;}
.laundry-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:1.05rem 1.35rem;display:flex;justify-content:space-between;align-items:center;gap:12px;box-shadow:var(--shadow);transition:box-shadow .18s;}
.laundry-card:hover{box-shadow:var(--shadow-lift);}
.laundry-info{flex:1;}
.laundry-name{font-family:var(--display);font-size:14.5px;font-weight:600;color:var(--ink);}
.laundry-email{font-size:12.5px;color:var(--ink-2);margin-top:3px;}
.laundry-date{font-size:11.5px;color:var(--ink-3);margin-top:3px;}
.laundry-actions{display:flex;gap:8px;align-items:center;}
.status-badge{font-size:10px;padding:4px 11px;border-radius:999px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
.status-badge.active{background:#E4F3EC;color:#157A57;}
.status-badge.inactive{background:#EEF2F4;color:var(--ink-3);}
.toggle-btn{padding:6px 13px;font-size:12px;font-weight:500;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;color:var(--ink-2);transition:.15s;}
.toggle-btn:hover{background:var(--bg);border-color:var(--brand);color:var(--brand);}
.delete-btn{width:30px;height:30px;font-size:14px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;color:var(--ink-3);transition:.15s;display:inline-flex;align-items:center;justify-content:center;}
.delete-btn:hover{background:#FBECEC;color:var(--red);border-color:#F0CFCF;}

.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(12,42,58,.45);backdrop-filter:blur(2px);z-index:100;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
.modal-backdrop.open{display:flex;}
.modal{background:var(--surface);border-radius:16px;border:1px solid var(--line);padding:1.5rem;width:400px;max-width:92vw;margin:auto;box-shadow:0 20px 60px rgba(12,42,58,.22);}
.modal h3{font-family:var(--display);font-size:17px;font-weight:700;color:var(--ink);margin-bottom:1rem;}
.form-row{margin-bottom:.75rem;}
.form-row label{display:block;font-size:12px;font-weight:500;color:var(--ink-2);margin-bottom:4px;}
.form-row input{width:100%;padding:9px 11px;font-size:14px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);}
.form-row input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(46,127,184,.13);}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--line-2);}
.btn-cancel{padding:9px 16px;font-size:13px;font-weight:600;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink-2);cursor:pointer;transition:.15s;}
.btn-cancel:hover{background:var(--bg);}
.btn-submit{padding:9px 16px;font-size:13px;font-weight:600;font-family:var(--display);background:var(--brand);color:#fff;border:none;border-radius:9px;cursor:pointer;transition:background .15s;}
.btn-submit:hover{background:var(--brand-d);}
.btn-submit:disabled{background:#EAF0F3;color:var(--ink-3);cursor:default;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#DCEAF1;font-size:13px;font-weight:500;padding:11px 20px;border-radius:10px;display:none;align-items:center;gap:8px;z-index:200;white-space:nowrap;box-shadow:0 8px 30px rgba(12,42,58,.28);}
.toast.show{display:flex;}
.toast.error{background:#7A211E;color:#F6CFCD;}
.loading{text-align:center;padding:2.5rem;color:var(--ink-3);font-size:14px;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.note-box{font-size:12px;color:var(--ink-2);background:#EEF4F8;border:1px solid #DCE8EF;padding:11px 13px;border-radius:10px;margin-bottom:.85rem;line-height:1.5;}
@media (max-width:680px){
  .stats{grid-template-columns:1fr;}
  .header,.stats,.content{padding-left:1rem;padding-right:1rem;}
  .laundry-card{flex-direction:column;align-items:flex-start;}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <img src="/washly-logo-light.svg" alt="Washly">
      <span class="admin-badge">Admin</span>
    </div>
    <label class="login-label">Email</label>
    <input class="login-input" type="email" id="login-email" placeholder="admin@washly.app">
    <label class="login-label">Password</label>
    <input class="login-input" type="password" id="login-password" placeholder="••••••••">
    <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error">Incorrect credentials or not an admin account.</div>
  </div>
</div>

<!-- APP -->
<div class="app-screen" id="app-screen">
  <div class="header">
    <div class="header-left">
      <img src="/washly-logo-light.svg" alt="Washly">
      <span class="admin-badge">Admin</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="font-size:12px;color:#888;" id="admin-email"></div>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Total Laundries</div><div class="stat-value" id="stat-total">—</div></div>
    <div class="stat"><div class="stat-label">Active</div><div class="stat-value" id="stat-active">—</div></div>
    <div class="stat"><div class="stat-label">Inactive</div><div class="stat-value" id="stat-inactive">—</div></div>
  </div>

  <div class="content">
    <div class="section-header">
      <div class="section-title">Laundry Accounts</div>
      <button class="add-btn" onclick="openModal()">+ Add Laundry</button>
    </div>
    <div class="laundry-list" id="laundry-list">
      <div class="loading"><span class="spinner"></span> Loading...</div>
    </div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-backdrop" id="modal" onclick="handleBackdropClick(event)">
  <div class="modal">
    <h3>Add New Laundry</h3>
    <div class="note-box">
      First create the account in <strong>Supabase → Authentication → Users</strong>, then register it here.
    </div>
    <div class="form-row"><label>Laundry Name</label><input type="text" id="f-name" placeholder="Al Noor Laundry"></div>
    <div class="form-row"><label>Email (must match Supabase account)</label><input type="email" id="f-email" placeholder="laundry@example.com"></div>
    <div class="form-row"><label>Phone (optional)</label><input type="text" id="f-phone" placeholder="+974 5xxx xxxx"></div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-submit" id="btn-submit" onclick="addLaundry()">Register Laundry</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toast-msg">Done!</span></div>

<script>
const SUPABASE_URL = 'https://ejmgiybyqqzbtylhgviq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_iTZMaKFvYbZZX9kzOwB7gQ_KS9AlTBy';

let authToken = null, currentUser = null, laundries = [];

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value.trim();
  if (!email || !password) return;
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = '...';
  document.getElementById('login-error').classList.remove('show');
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok || !data.access_token) throw new Error();
    // Check if admin
    const adminRes = await fetch(`${SUPABASE_URL}/rest/v1/admins?user_id=eq.${data.user.id}`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + data.access_token }
    });
    const adminData = await adminRes.json();
    if (!adminData.length) throw new Error('Not admin');
    authToken = data.access_token;
    currentUser = data.user;
    localStorage.setItem('washly_admin_token', authToken);
    localStorage.setItem('washly_admin_user', JSON.stringify(currentUser));
    showApp();
  } catch(e) {
    document.getElementById('login-error').classList.add('show');
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

function doLogout() {
  localStorage.removeItem('washly_admin_token');
  localStorage.removeItem('washly_admin_user');
  authToken = null; currentUser = null;
  document.getElementById('app-screen').classList.remove('show');
  document.getElementById('login-screen').style.display = 'flex';
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').classList.add('show');
  document.getElementById('admin-email').textContent = currentUser.email;
  fetchLaundries();
}

function checkSession() {
  const token = localStorage.getItem('washly_admin_token');
  const user = localStorage.getItem('washly_admin_user');
  if (token && user) { authToken = token; currentUser = JSON.parse(user); showApp(); }
}

function getHeaders() {
  return { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + authToken };
}

async function fetchLaundries() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/laundries?order=created_at.desc`, { headers: getHeaders() });
    laundries = await res.json();
    updateStats();
    renderLaundries();
  } catch {
    document.getElementById('laundry-list').innerHTML = '<div class="loading" style="color:#A32D2D">Could not load laundries.</div>';
  }
}

function updateStats() {
  const active = laundries.filter(l => l.active).length;
  document.getElementById('stat-total').textContent = laundries.length;
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-inactive').textContent = laundries.length - active;
}

function renderLaundries() {
  const list = document.getElementById('laundry-list');
  if (!laundries.length) { list.innerHTML = '<div class="loading">No laundries yet — add your first one!</div>'; return; }
  list.innerHTML = laundries.map(l => `
    <div class="laundry-card">
      <div class="laundry-info">
        <div class="laundry-name">${l.name}</div>
        <div class="laundry-email">${l.email}</div>
        <div class="laundry-date">Added ${new Date(l.created_at).toLocaleDateString()}</div>
      </div>
      <div class="laundry-actions">
        <span class="status-badge ${l.active?'active':'inactive'}">${l.active?'Active':'Inactive'}</span>
        <button class="toggle-btn" onclick="toggleLaundry('${l.id}', ${l.active})">${l.active?'Disable':'Enable'}</button>
        <button class="delete-btn" onclick="deleteLaundry('${l.id}')">✕</button>
      </div>
    </div>
  `).join('');
}

async function toggleLaundry(id, current) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/laundries?id=eq.${id}`, {
      method: 'PATCH',
      headers: { ...getHeaders(), 'Prefer': 'return=minimal' },
      body: JSON.stringify({ active: !current })
    });
    const l = laundries.find(x => x.id === id);
    if (l) l.active = !current;
    updateStats(); renderLaundries();
    showToast(current ? 'Account disabled' : 'Account enabled', false);
  } catch { showToast('Failed to update', true); }
}

async function deleteLaundry(id) {
  if (!confirm('Are you sure you want to delete this laundry?')) return;
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/laundries?id=eq.${id}`, {
      method: 'DELETE', headers: getHeaders()
    });
    laundries = laundries.filter(x => x.id !== id);
    updateStats(); renderLaundries();
    showToast('Laundry deleted', false);
  } catch { showToast('Failed to delete', true); }
}

async function addLaundry() {
  const name = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  if (!name || !email) { showToast('Please fill name and email', true); return; }
  const btn = document.getElementById('btn-submit');
  btn.disabled = true; btn.textContent = '...';
  try {
    // Look up user by email
    const checkRes = await fetch(`${SUPABASE_URL}/rest/v1/laundries?email=eq.${encodeURIComponent(email)}`, { headers: getHeaders() });
    const existing = await checkRes.json();
    if (existing.length) throw new Error('This email is already registered');
    // Save to laundries table
    const lRes = await fetch(`${SUPABASE_URL}/rest/v1/laundries`, {
      method: 'POST',
      headers: { ...getHeaders(), 'Prefer': 'return=representation' },
      body: JSON.stringify({ name, email, active: true })
    });
    if (!lRes.ok) throw new Error(await lRes.text());
    const lData = await lRes.json();
    laundries.unshift(lData[0]);
    closeModal();
    updateStats(); renderLaundries();
    showToast(`${name} registered!`, false);
  } catch(e) { showToast('Error: ' + e.message, true); }
  finally { btn.disabled = false; btn.textContent = 'Register Laundry'; }
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
}

function handleBackdropClick(e) { if (e.target === document.getElementById('modal')) closeModal(); }
function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  ['f-name','f-email','f-phone'].forEach(id => document.getElementById(id).value = '');
}

document.getElementById('login-password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
checkSession();
</script>
</body>
</html>
