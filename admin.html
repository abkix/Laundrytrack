<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4A9FD4">
<title>Washly Admin</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
body { background: #f5f5f4; color: #1c1c1a; }

/* LOGIN */
.login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; background: linear-gradient(160deg, #e8f3fb 0%, #f5f5f4 100%); }
.login-box { background: #fff; border-radius: 16px; border: 0.5px solid #e0e0de; padding: 2rem; width: 100%; max-width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,0.07); }
.login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 1.75rem; justify-content: center; }
.login-logo img { width: 48px; height: 48px; border-radius: 12px; }
.login-logo-text { font-size: 22px; font-weight: 600; color: #4A9FD4; }
.admin-badge { font-size: 11px; background: #4A9FD4; color: #fff; padding: 2px 8px; border-radius: 20px; margin-left: 6px; vertical-align: middle; }
.login-label { font-size: 12px; color: #888; margin-bottom: 4px; display: block; }
.login-input { width: 100%; padding: 10px 12px; font-size: 14px; border: 0.5px solid #ccc; border-radius: 8px; margin-bottom: 0.75rem; background: #fafafa; }
.login-input:focus { outline: none; border-color: #4A9FD4; }
.login-btn { width: 100%; padding: 11px; font-size: 14px; font-weight: 600; background: #4A9FD4; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
.login-btn:disabled { background: #aaa; cursor: default; }
.login-error { font-size: 13px; color: #A32D2D; background: #FCEBEB; padding: 8px 12px; border-radius: 8px; margin-top: 0.75rem; display: none; }
.login-error.show { display: block; }

/* APP */
.app-screen { display: none; }
.app-screen.show { display: block; }
.header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; background: #fff; border-bottom: 0.5px solid #e0e0de; }
.header-left { display: flex; align-items: center; gap: 10px; }
.brand { font-size: 18px; font-weight: 600; color: #4A9FD4; }
.logout-btn { padding: 5px 12px; font-size: 12px; border: 0.5px solid #ddd; border-radius: 6px; background: transparent; color: #888; cursor: pointer; }

/* STATS */
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 1.25rem 1.5rem; border-bottom: 0.5px solid #e0e0de; background: #fff; }
.stat { background: #f5f5f4; border-radius: 10px; padding: 1rem; }
.stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.stat-value { font-size: 26px; font-weight: 500; color: #4A9FD4; }

/* CONTENT */
.content { padding: 1.25rem 1.5rem; }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.section-title { font-size: 16px; font-weight: 500; }
.add-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; font-size: 13px; font-weight: 500; background: #4A9FD4; color: #fff; border: none; border-radius: 8px; cursor: pointer; }

/* TABLE */
.laundry-list { display: flex; flex-direction: column; gap: 8px; }
.laundry-card { background: #fff; border: 0.5px solid #e0e0de; border-radius: 12px; padding: 1rem 1.25rem; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.laundry-info { flex: 1; }
.laundry-name { font-size: 14px; font-weight: 500; }
.laundry-email { font-size: 12px; color: #888; margin-top: 2px; }
.laundry-date { font-size: 11px; color: #aaa; margin-top: 2px; }
.laundry-actions { display: flex; gap: 8px; align-items: center; }
.status-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
.status-badge.active { background: #E1F0FB; color: #1A5F8A; }
.status-badge.inactive { background: #f5f5f4; color: #aaa; }
.toggle-btn { padding: 5px 12px; font-size: 12px; border: 0.5px solid #ddd; border-radius: 6px; background: transparent; cursor: pointer; color: #555; }
.toggle-btn:hover { background: #f5f5f4; }
.delete-btn { padding: 5px 10px; font-size: 12px; border: 0.5px solid #f5c6c6; border-radius: 6px; background: transparent; cursor: pointer; color: #A32D2D; }

/* MODAL */
.modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: flex-start; justify-content: center; padding: 20px; overflow-y: auto; }
.modal-backdrop.open { display: flex; }
.modal { background: #fff; border-radius: 12px; padding: 1.5rem; width: 400px; max-width: 92vw; margin: auto; }
.modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
.form-row { margin-bottom: 0.75rem; }
.form-row label { display: block; font-size: 12px; color: #888; margin-bottom: 3px; }
.form-row input { width: 100%; padding: 8px 10px; font-size: 14px; border: 0.5px solid #ccc; border-radius: 8px; }
.form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; padding-top: 1rem; border-top: 0.5px solid #eee; }
.btn-cancel { padding: 7px 14px; font-size: 13px; border: 0.5px solid #ccc; border-radius: 8px; background: transparent; color: #666; cursor: pointer; }
.btn-submit { padding: 7px 14px; font-size: 13px; font-weight: 500; background: #4A9FD4; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
.btn-submit:disabled { background: #aaa; cursor: default; }

/* TOAST */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1A5F8A; color: #B8DDF5; font-size: 13px; padding: 10px 18px; border-radius: 8px; display: none; align-items: center; gap: 8px; z-index: 200; white-space: nowrap; }
.toast.show { display: flex; }
.toast.error { background: #791F1F; color: #F7C1C1; }
.loading { text-align: center; padding: 2rem; color: #888; font-size: 14px; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #ddd; border-top-color: #4A9FD4; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <img src="/icon-192.png">
      <div>
        <span class="login-logo-text">Washly</span>
        <span class="admin-badge">Admin</span>
      </div>
    </div>
    <label class="login-label">Email</label>
    <input class="login-input" type="email" id="login-email" placeholder="admin@washly.app">
    <label class="login-label">Password</label>
    <input class="login-input" type="password" id="login-password" placeholder="••••••••">
    <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error">Incorrect credentials or not an admin account.</div>
  </div>
</div>

<!-- APP -->
<div class="app-screen" id="app-screen">
  <div class="header">
    <div class="header-left">
      <img src="/icon-192.png" style="width:32px;height:32px;border-radius:8px;">
      <div>
        <div class="brand">Washly <span class="admin-badge">Admin</span></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="font-size:12px;color:#888;" id="admin-email"></div>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Total Laundries</div><div class="stat-value" id="stat-total">—</div></div>
    <div class="stat"><div class="stat-label">Active</div><div class="stat-value" id="stat-active">—</div></div>
    <div class="stat"><div class="stat-label">Inactive</div><div class="stat-value" id="stat-inactive">—</div></div>
  </div>

  <div class="content">
    <div class="section-header">
      <div class="section-title">Laundry Accounts</div>
      <button class="add-btn" onclick="openModal()">+ Add Laundry</button>
    </div>
    <div class="laundry-list" id="laundry-list">
      <div class="loading"><span class="spinner"></span> Loading...</div>
    </div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-backdrop" id="modal" onclick="handleBackdropClick(event)">
  <div class="modal">
    <h3>Add New Laundry</h3>
    <div style="font-size:12px;color:#888;background:#f5f5f4;padding:10px;border-radius:8px;margin-bottom:0.75rem;">
      ⚠️ First create the account in <strong>Supabase → Authentication → Users</strong>, then register it here.
    </div>
    <div class="form-row"><label>Laundry Name</label><input type="text" id="f-name" placeholder="Al Noor Laundry"></div>
    <div class="form-row"><label>Email (must match Supabase account)</label><input type="email" id="f-email" placeholder="laundry@example.com"></div>
    <div class="form-row"><label>Phone (optional)</label><input type="text" id="f-phone" placeholder="+974 5xxx xxxx"></div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-submit" id="btn-submit" onclick="addLaundry()">Register Laundry</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toast-msg">Done!</span></div>

<script>
const SUPABASE_URL = 'https://ejmgiybyqqzbtylhgviq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_iTZMaKFvYbZZX9kzOwB7gQ_KS9AlTBy';

let authToken = null, currentUser = null, laundries = [];

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value.trim();
  if (!email || !password) return;
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = '...';
  document.getElementById('login-error').classList.remove('show');
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok || !data.access_token) throw new Error();
    // Check if admin
    const adminRes = await fetch(`${SUPABASE_URL}/rest/v1/admins?user_id=eq.${data.user.id}`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + data.access_token }
    });
    const adminData = await adminRes.json();
    if (!adminData.length) throw new Error('Not admin');
    authToken = data.access_token;
    currentUser = data.user;
    localStorage.setItem('washly_admin_token', authToken);
    localStorage.setItem('washly_admin_user', JSON.stringify(currentUser));
    showApp();
  } catch(e) {
    document.getElementById('login-error').classList.add('show');
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

function doLogout() {
  localStorage.removeItem('washly_admin_token');
  localStorage.removeItem('washly_admin_user');
  authToken = null; currentUser = null;
  document.getElementById('app-screen').classList.remove('show');
  document.getElementById('login-screen').style.display = 'flex';
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').classList.add('show');
  document.getElementById('admin-email').textContent = currentUser.email;
  fetchLaundries();
}

function checkSession() {
  const token = localStorage.getItem('washly_admin_token');
  const user = localStorage.getItem('washly_admin_user');
  if (token && user) { authToken = token; currentUser = JSON.parse(user); showApp(); }
}

function getHeaders() {
  return { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + authToken };
}

async function fetchLaundries() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/laundries?order=created_at.desc`, { headers: getHeaders() });
    laundries = await res.json();
    updateStats();
    renderLaundries();
  } catch {
    document.getElementById('laundry-list').innerHTML = '<div class="loading" style="color:#A32D2D">Could not load laundries.</div>';
  }
}

function updateStats() {
  const active = laundries.filter(l => l.active).length;
  document.getElementById('stat-total').textContent = laundries.length;
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-inactive').textContent = laundries.length - active;
}

function renderLaundries() {
  const list = document.getElementById('laundry-list');
  if (!laundries.length) { list.innerHTML = '<div class="loading">No laundries yet — add your first one!</div>'; return; }
  list.innerHTML = laundries.map(l => `
    <div class="laundry-card">
      <div class="laundry-info">
        <div class="laundry-name">${l.name}</div>
        <div class="laundry-email">${l.email}</div>
        <div class="laundry-date">Added ${new Date(l.created_at).toLocaleDateString()}</div>
      </div>
      <div class="laundry-actions">
        <span class="status-badge ${l.active?'active':'inactive'}">${l.active?'Active':'Inactive'}</span>
        <button class="toggle-btn" onclick="toggleLaundry('${l.id}', ${l.active})">${l.active?'Disable':'Enable'}</button>
        <button class="delete-btn" onclick="deleteLaundry('${l.id}')">✕</button>
      </div>
    </div>
  `).join('');
}

async function toggleLaundry(id, current) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/laundries?id=eq.${id}`, {
      method: 'PATCH',
      headers: { ...getHeaders(), 'Prefer': 'return=minimal' },
      body: JSON.stringify({ active: !current })
    });
    const l = laundries.find(x => x.id === id);
    if (l) l.active = !current;
    updateStats(); renderLaundries();
    showToast(current ? 'Account disabled' : 'Account enabled', false);
  } catch { showToast('Failed to update', true); }
}

async function deleteLaundry(id) {
  if (!confirm('Are you sure you want to delete this laundry?')) return;
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/laundries?id=eq.${id}`, {
      method: 'DELETE', headers: getHeaders()
    });
    laundries = laundries.filter(x => x.id !== id);
    updateStats(); renderLaundries();
    showToast('Laundry deleted', false);
  } catch { showToast('Failed to delete', true); }
}

async function addLaundry() {
  const name = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  if (!name || !email) { showToast('Please fill name and email', true); return; }
  const btn = document.getElementById('btn-submit');
  btn.disabled = true; btn.textContent = '...';
  try {
    // Look up user by email
    const checkRes = await fetch(`${SUPABASE_URL}/rest/v1/laundries?email=eq.${encodeURIComponent(email)}`, { headers: getHeaders() });
    const existing = await checkRes.json();
    if (existing.length) throw new Error('This email is already registered');
    // Save to laundries table
    const lRes = await fetch(`${SUPABASE_URL}/rest/v1/laundries`, {
      method: 'POST',
      headers: { ...getHeaders(), 'Prefer': 'return=representation' },
      body: JSON.stringify({ name, email, active: true })
    });
    if (!lRes.ok) throw new Error(await lRes.text());
    const lData = await lRes.json();
    laundries.unshift(lData[0]);
    closeModal();
    updateStats(); renderLaundries();
    showToast(`${name} registered!`, false);
  } catch(e) { showToast('Error: ' + e.message, true); }
  finally { btn.disabled = false; btn.textContent = 'Register Laundry'; }
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
}

function handleBackdropClick(e) { if (e.target === document.getElementById('modal')) closeModal(); }
function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  ['f-name','f-email','f-phone'].forEach(id => document.getElementById(id).value = '');
}

document.getElementById('login-password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
checkSession();
</script>
</body>
</html>
