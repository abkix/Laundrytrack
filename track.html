<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2E7FB8">
<title>Track Your Order — Washly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
:root{
  --ink:#0C2A3A; --ink-2:#54707E; --ink-3:#8AA1AC;
  --brand:#2E7FB8; --brand-d:#1F5E8C; --aqua:#3FB6C9;
  --line:#E5ECF0; --line-2:#EEF3F6; --red:#D6463F;
  --display:'Sora',system-ui,sans-serif; --body:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:var(--body);}
body{background:radial-gradient(900px 480px at 50% -8%, #E3EFF6 0%, transparent 58%), linear-gradient(180deg,#EEF4F8 0%,#F4F7F9 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2.25rem 1rem;color:var(--ink);-webkit-font-smoothing:antialiased;}
.header{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:1.75rem;}
.header img{height:32px;}
.header-text{font-family:var(--display);font-size:20px;font-weight:700;color:var(--brand);}
.card{background:#fff;border-radius:18px;border:1px solid var(--line);padding:1.75rem;width:100%;max-width:430px;box-shadow:0 6px 30px rgba(12,42,58,.09);}
.order-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid var(--line-2);gap:12px;}
.order-num{font-size:12.5px;color:var(--ink-3);margin-bottom:4px;font-weight:500;}
.order-name{font-family:var(--display);font-size:19px;font-weight:700;color:var(--ink);}
.order-items{font-size:13px;color:var(--ink-2);margin-top:4px;}
.urgent-badge{font-size:10px;padding:3px 10px;background:#FBECEC;color:#B5352F;border-radius:999px;font-weight:700;white-space:nowrap;letter-spacing:.05em;text-transform:uppercase;}
.laundry-name{font-size:12.5px;color:var(--ink-2);margin-bottom:1.4rem;display:flex;align-items:center;gap:6px;}
.progress-section{margin-bottom:1.25rem;}
.progress-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);margin-bottom:1.1rem;}
.steps{display:flex;flex-direction:column;gap:0;}
.step-row{display:flex;align-items:flex-start;gap:13px;}
.step-left{display:flex;flex-direction:column;align-items:center;}
.step-circle{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--ink-3);background:#fff;flex-shrink:0;}
.step-circle.done{background:var(--brand);border-color:var(--brand);color:#fff;}
.step-circle.active{background:#fff;border:2px solid var(--brand);color:var(--brand);animation:pulse 2s infinite;}
.step-line{width:2px;height:30px;background:var(--line);margin:3px 0;border-radius:2px;}
.step-line.done{background:var(--brand);}
.step-content{padding:5px 0 26px 0;}
.step-name{font-family:var(--display);font-size:14px;font-weight:600;color:var(--ink-3);}
.step-name.done{color:var(--ink-2);}
.step-name.active{color:var(--brand);font-weight:700;}
.step-status{font-size:12px;color:var(--ink-3);margin-top:2px;}
.step-status.active{color:var(--brand);}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(46,127,184,.28)}50%{box-shadow:0 0 0 7px rgba(46,127,184,0)}}
.current-status{background:linear-gradient(135deg,#EAF3F8,#E2EFF6);border:1px solid #DBE9F1;border-radius:14px;padding:1.1rem;text-align:center;margin-bottom:1.25rem;}
.current-status-label{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);margin-bottom:6px;}
.current-status-value{font-family:var(--display);font-size:19px;font-weight:700;color:var(--brand-d);}
.current-status-ar{font-size:14px;color:var(--brand);margin-top:3px;direction:rtl;font-weight:500;}
.footer{font-size:12px;color:var(--ink-3);text-align:center;margin-top:1.25rem;}
.footer a{color:var(--brand);text-decoration:none;font-weight:600;}
.loading{text-align:center;padding:3rem;color:var(--ink-3);}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.error{text-align:center;padding:3rem;color:var(--red);font-weight:500;}
@media (prefers-reduced-motion:reduce){*{animation:none!important;}}
</style>
</head>
<body>

<div class="header">
  <img src="/washly-logo-light.svg" alt="Washly">
</div>

<div class="card" id="card">
  <div class="loading"><span class="spinner"></span> Loading your order...</div>
</div>

<div class="footer">Powered by <a href="/">Washly</a> — Laundry Management System</div>

<script>
const SUPABASE_URL = 'https://ejmgiybyqqzbtylhgviq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_iTZMaKFvYbZZX9kzOwB7gQ_KS9AlTBy';

const SERVICE_PIPELINES = {
  wash_iron: ['Received','Washing','Ironing','Ready'],
  wash_only: ['Received','Washing','Ready'],
  iron_only: ['Received','Ironing','Ready'],
  dry_clean: ['Received','Dry Cleaning','Ready'],
};
const COLLECTION_STEP = { collect: 'Collected', delivery: 'Delivered' };
const STEP_ICONS = { 'Received':'📥','Washing':'💧','Ironing':'♨️','Dry Cleaning':'👕','Ready':'✅','Collected':'🛍','Delivered':'🚚' };
const AR_STATUS = { 'Received':'استُلم','Washing':'جاري الغسيل','Ironing':'جاري الكوي','Dry Cleaning':'جاري التنظيف الجاف','Ready':'جاهز للاستلام','Collected':'تم الاستلام','Delivered':'تم التوصيل' };

function getPipeline(s, c) { return [...SERVICE_PIPELINES[s], COLLECTION_STEP[c]]; }

async function loadOrder() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  if (!token) { showError('Invalid tracking link.'); return; }

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_tracked_order`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ p_token: token })
    });
    const data = await res.json();
    if (!Array.isArray(data) || !data.length) { showError('Order not found. Please check your link.'); return; }
    renderOrder(data[0]);
  } catch {
    showError('Could not load order. Please try again.');
  }
}

function renderOrder(o) {
  const pipe = getPipeline(o.service, o.collection);
  const currentStatus = pipe[o.status_idx];
  const isDone = o.status_idx >= pipe.length - 1;

  const stepsHtml = pipe.map((s, i) => {
    const isLast = i === pipe.length - 1;
    const done = i < o.status_idx || (isLast && o.status_idx >= pipe.length - 1);
    const active = i === o.status_idx && !done;
    const icon = STEP_ICONS[s] || '•';
    return `
      <div class="step-row">
        <div class="step-left">
          <div class="step-circle ${done?'done':active?'active':''}">${done?'✓':icon}</div>
          ${!isLast ? `<div class="step-line ${done?'done':''}"></div>` : ''}
        </div>
        <div class="step-content">
          <div class="step-name ${done?'done':active?'active':''}">${s}</div>
          <div class="step-status ${active?'active':''}">${active ? '● In progress' : done ? 'Completed' : 'Waiting'}</div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('card').innerHTML = `
    <div class="order-header">
      <div>
        <div class="order-num">Order #${String(o.id).padStart(3,'0')} · ${o.order_time}</div>
        <div class="order-name">${o.customer_name}</div>
        <div class="order-items">${o.items}</div>
      </div>
      ${o.priority === 'urgent' ? '<span class="urgent-badge">URGENT</span>' : ''}
    </div>
    <div class="laundry-name">${o.service.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())} · ${o.collection === 'collect' ? 'Collect from shop' : 'Delivery'}</div>
    <div class="current-status">
      <div class="current-status-label">Current Status</div>
      <div class="current-status-value">${currentStatus} ${STEP_ICONS[currentStatus]||''}</div>
      <div class="current-status-ar">${AR_STATUS[currentStatus]||''}</div>
    </div>
    <div class="progress-section">
      <div class="progress-title">Order Progress</div>
      <div class="steps">${stepsHtml}</div>
    </div>
  `;
}

function showError(msg) {
  document.getElementById('card').innerHTML = `<div class="error">${msg}</div>`;
}

loadOrder();
// Auto refresh every 30 seconds
setInterval(loadOrder, 30000);
</script>
</body>
</html>
